version: '3.8'

services:
  wg-telegram-bot:
    build: .
    container_name: wg-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - wg-easy-data:/etc/wireguard:ro
    networks:
      - wg-network

networks:
  wg-network:
    driver: bridge

volumes:
  wg-easy-data:
    external: true
